version: '3.8'

services:
  api:
    build: .
    container_name: api_weather_app
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - DB_HOST=db
      - DB_USER=${DB_USER:-api_user}
      - DB_PASSWORD=${DB_PASSWORD:-api_password}
      - DB_NAME=weather_db
      - WEATHER_API_KEY=${WEATHER_API_KEY}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - weather_net

  db:
    image: mysql:8.0
    container_name: api_weather_db
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD:-rootpassword}
      - MYSQL_DATABASE=weather_db
      - MYSQL_USER=${DB_USER:-api_user}
      - MYSQL_PASSWORD=${DB_PASSWORD:-api_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost", "-u", "${DB_USER:-api_user}", "-p${DB_PASSWORD:-api_password}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - weather_net

volumes:
  mysql_data:

networks:
  weather_net:
